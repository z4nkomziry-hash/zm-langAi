<!DOCTYPE html><html lang="ckb" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Admin - Ziman</title><style>body{font-family:sans-serif;background:#f8fafc;padding:20px}.card{background:#fff;border-radius:12px;padding:16px;margin:8px 0;box-shadow:0 2px 8px rgba(0,0,0,.08)}.btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-weight:600;margin:4px}.btn-approve{background:#10B981;color:#fff}.btn-reject{background:#EF4444;color:#fff}</style></head><body><h2>🔐 Admin - Ziman</h2><input type="password" id="pass" placeholder="پاسۆرد"><button onclick="login()">چوونەژوورەوە</button><div id="panel" style="display:none"><h3>پارەدانە چاوەڕوانەکان</h3><div id="list"></div></div><script src="config.js"></script><script>function login(){if(document.getElementById('pass').value===AppConfig.adminPassword){document.getElementById('panel').style.display='block';load()}else alert('❌ هەڵە')}function load(){let p=JSON.parse(localStorage.getItem('zm_payments')||'[]'),h='';p.forEach((x,i)=>{h+=`<div class="card"><p>${x.name} | ${x.package} | ${x.method}</p><p>ڕەوش: ${x.status}</p>${x.status==='pending'?`<button class="btn btn-approve" onclick="update(${i},'approved')">✅ چالاک</button><button class="btn btn-reject" onclick="update(${i},'rejected')">❌ ڕەت</button>`:''}</div>`});document.getElementById('list').innerHTML=h||'<p>هیچ نییە</p>'}function update(i,s){let p=JSON.parse(localStorage.getItem('zm_payments')||'[]');p[i].status=s;localStorage.setItem('zm_payments',JSON.stringify(p));load();alert('✅ ئەنجامدرا')}</script></body></html>
