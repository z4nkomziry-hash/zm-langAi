<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#4F46E5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Ziman - فێربوونی ١٥ زمانی جیهانی بە شێوازی کارلێککەر">
    <link rel="manifest" href="manifest.json">
    <title>Ziman - فێربوونی زمان</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">

    <div class="app-container">
        
        <header class="app-header glass">
            <button class="menu-btn" id="menuBtn" aria-label="مینیو">
                <span></span><span></span><span></span>
            </button>
            <h1 class="header-logo" onclick="navigateTo('home')">🌍 Ziman</h1>
            <div class="header-stats">
                <span class="stat-item">🔥 <span id="hStreak">0</span></span>
                <span class="stat-item">⭐ <span id="hXP">0</span></span>
                <span class="stat-item">💎 <span id="hGems">0</span></span>
                <span class="stat-item">🪙 <span id="hCoins">0</span></span>
            </div>
        </header>

        <div class="menu-overlay" id="menuOverlay"></div>
        <nav class="side-menu glass" id="sideMenu">
            <div class="menu-profile gradient-primary">
                <div class="menu-avatar" id="menuAvatar">👤</div>
                <div>
                    <div class="menu-name" id="menuName">فێرخواز</div>
                    <div class="menu-level" id="menuLevel">ئاست ١</div>
                </div>
            </div>
            <ul class="menu-list">
                <li onclick="navigateTo('home')" class="active"><span>🏠</span> سەرەکی</li>
                <li onclick="navigateTo('lessons')"><span>📚</span> وانەکان</li>
                <li onclick="navigateTo('flashcards')"><span>🃏</span> فلاشکارت</li>
                <li onclick="navigateTo('quiz')"><span>📝</span> کویز</li>
                <li onclick="navigateTo('speed-quiz')"><span>⚡</span> کویزی خێرا</li>
                <li onclick="navigateTo('listening')"><span>🎧</span> بیستن</li>
                <li onclick="navigateTo('speaking')"><span>🎤</span> قسەکردن</li>
                <li onclick="navigateTo('reading')"><span>📖</span> خوێندنەوە</li>
                <li onclick="navigateTo('writing')"><span>✍️</span> نووسین</li>
                <li onclick="navigateTo('ai-teacher')"><span>🤖</span> مامۆستای AI</li>
            </ul>
            <div class="menu-divider"></div>
            <ul class="menu-list">
                <li onclick="navigateTo('progress')"><span>📊</span> پێشکەوتن</li>
                <li onclick="navigateTo('achievements')"><span>🏆</span> دەستکەوتەکان</li>
                <li onclick="navigateTo('community')"><span>👥</span> کۆمەڵگا</li>
                <li onclick="navigateTo('packages')"><span>💳</span> پاکێجەکان</li>
                <li onclick="navigateTo('sponsor')"><span>📢</span> سپۆنسەر</li>
                <li onclick="navigateTo('contact')"><span>📞</span> پەیوەندی</li>
                <li onclick="navigateTo('settings')"><span>⚙️</span> ڕێکخستن</li>
            </ul>
        </nav>

        <main class="main-content" id="mainContent"></main>

        <nav class="bottom-nav glass">
            <button onclick="navigateTo('home')" class="active" data-nav="home"><span>🏠</span><small>سەرەکی</small></button>
            <button onclick="navigateTo('lessons')" data-nav="lessons"><span>📚</span><small>وانە</small></button>
            <button onclick="navigateTo('quiz')" data-nav="quiz"><span>📝</span><small>کویز</small></button>
            <button onclick="navigateTo('ai-teacher')" data-nav="ai"><span>🤖</span><small>AI</small></button>
            <button onclick="navigateTo('packages')" data-nav="packages"><span>💳</span><small>پاکێج</small></button>
        </nav>

        <div class="ai-bubble" id="aiBubble" onclick="navigateTo('ai-teacher')">🤖</div>
    </div>

    <canvas id="confettiCanvas"></canvas>
    <div class="toast-container" id="toastContainer"></div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
